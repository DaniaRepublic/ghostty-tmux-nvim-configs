# Options to make tmux more pleasant 
set -g mouse on
set -g set-clipboard on
set -as terminal-features ',*:clipboard'
set -g default-terminal "tmux-256color"
set-option -g focus-events on
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# skip window close confirmation unless its the last open window
bind-key & if-shell "[ #{session_windows} -eq 1 ]" 'confirm-before -p "kill-window #W? (y/n)" kill-window' kill-window
# Press prefix + O to toggle OpenCode in a floating popup
bind-key O display-popup -d "#{pane_current_path}" -w "80%" -h "80%" -E "$SHELL -ic 'opencode'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# configure theme
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme 'dragon'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.config/tmux/plugins/tpm/tpm

